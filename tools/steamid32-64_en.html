<div class="container">
    <h2>SteamID Converter</h2>

    <!-- SteamID64 輸入框 -->
    <div class="input-group">
        <label for="id64">SteamID64 (Community ID)</label>
        <input type="text" id="id64" placeholder="Example: 76561198099466387" oninput="convertFrom64()">
    </div>

    <!-- SteamID32 輸入框 -->
    <div class="input-group">
        <label for="id32">SteamID32 (Account ID / Dota2 ID)</label>
        <input type="text" id="id32" placeholder="Example: 139200659" oninput="convertFrom32()">
    </div>

    <div class="info">
        Tip: Enter either value and the other one will be calculated automatically.
    </div>

    <div class="footer">
        Uses BigInt to keep 64-bit precision accurate.
    </div>
</div>

<script>
    // Steam 魔法常數
    const STEAM_CONSTANT = BigInt("76561197960265728");

    const input64 = document.getElementById('id64');
    const input32 = document.getElementById('id32');

    // 64 位轉 32 位
    function convertFrom64() {
        const val = input64.value.trim();
        if (!val) {
            input32.value = "";
            return;
        }
        try {
            const big64 = BigInt(val);
            const big32 = big64 - STEAM_CONSTANT;
            input32.value = big32.toString();
        } catch (e) {
            input32.value = "Invalid format";
        }
    }

    // 32 位轉 64 位
    function convertFrom32() {
        const val = input32.value.trim();
        if (!val) {
            input64.value = "";
            return;
        }
        try {
            const big32 = BigInt(val);
            const big64 = big32 + STEAM_CONSTANT;
            input64.value = big64.toString();
        } catch (e) {
            input64.value = "Invalid format";
        }
    }
</script>
