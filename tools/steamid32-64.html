<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SteamID 互轉小工具</title>
    <style>
        :root {
            --primary-color: #1b2838;
            --accent-color: #66c0f4;
            --text-color: #c7d5e0;
        }
        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--primary-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #2a475e;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 500px;
        }
        h2 { text-align: center; color: var(--accent-color); margin-top: 0; }
        .input-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; font-size: 0.9rem; color: #8f98a0; }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #16202d;
            border-radius: 4px;
            background-color: #101822;
            color: #fff;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s;
        }
        input:focus { border-color: var(--accent-color); }
        .info {
            font-size: 0.8rem;
            margin-top: 1rem;
            padding: 10px;
            background: rgba(0,0,0,0.2);
            border-left: 3px solid var(--accent-color);
        }
        .footer { text-align: center; margin-top: 2rem; font-size: 0.75rem; color: #556772; }
    </style>
</head>
<body>

<div class="container">
    <h2>SteamID 轉換器</h2>

    <!-- SteamID64 輸入框 -->
    <div class="input-group">
        <label for="id64">SteamID64 (Community ID)</label>
        <input type="text" id="id64" placeholder="例如: 76561198099466387" oninput="convertFrom64()">
    </div>

    <!-- SteamID32 輸入框 -->
    <div class="input-group">
        <label for="id32">SteamID32 (Account ID / Dota2 ID)</label>
        <input type="text" id="id32" placeholder="例如: 139200659" oninput="convertFrom32()">
    </div>

    <div class="info">
        提示：輸入其中一個，另一個會自動計算。
    </div>

    <div class="footer">
        使用 BigInt 技術確保 64 位精度準確
    </div>
</div>

<script>
    // Steam 魔法常數
    const STEAM_CONSTANT = BigInt("76561197960265728");

    const input64 = document.getElementById('id64');
    const input32 = document.getElementById('id32');

    // 64 位轉 32 位
    function convertFrom64() {
        const val = input64.value.trim();
        if (!val) {
            input32.value = "";
            return;
        }
        try {
            const big64 = BigInt(val);
            const big32 = big64 - STEAM_CONSTANT;
            input32.value = big32.toString();
        } catch (e) {
            input32.value = "格式錯誤";
        }
    }

    // 32 位轉 64 位
    function convertFrom32() {
        const val = input32.value.trim();
        if (!val) {
            input64.value = "";
            return;
        }
        try {
            const big32 = BigInt(val);
            const big64 = big32 + STEAM_CONSTANT;
            input64.value = big64.toString();
        } catch (e) {
            input64.value = "格式錯誤";
        }
    }
</script>

</body>
</html>
